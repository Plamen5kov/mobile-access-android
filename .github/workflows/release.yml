name: Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-test:
    uses: ./.github/workflows/android.yml

  release:
    needs: build-and-test
    runs-on: ubuntu-latest

    env:
      VERSION_CODE: ${{ github.run_number }}

    steps:
      - uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: terminal-frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: terminal-frontend

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        env:
          VERSION: ${{ steps.version.outputs.name }}
        run: mv app/build/outputs/apk/debug/app-debug.apk "terminal-${VERSION}.apk"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Terminal ${{ steps.version.outputs.name }}
          generate_release_notes: true
          files: terminal-${{ steps.version.outputs.name }}.apk
