name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: terminal-frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: terminal-frontend

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build frontend
        run: ./gradlew buildFrontend

      - name: Cache build
        uses: actions/cache/save@v4
        with:
          path: |
            .gradle
            app/build
            terminal-frontend/node_modules
            app/src/main/assets/www
          key: build-${{ github.sha }}

  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Restore build
        uses: actions/cache/restore@v4
        with:
          path: |
            .gradle
            app/build
            terminal-frontend/node_modules
            app/src/main/assets/www
          key: build-${{ github.sha }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run detekt
        run: ./gradlew detekt

  test:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Restore build
        uses: actions/cache/restore@v4
        with:
          path: |
            .gradle
            app/build
            terminal-frontend/node_modules
            app/src/main/assets/www
          key: build-${{ github.sha }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Restore build
        uses: actions/cache/restore@v4
        with:
          path: |
            .gradle
            app/build
            terminal-frontend/node_modules
            app/src/main/assets/www
          key: build-${{ github.sha }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug
