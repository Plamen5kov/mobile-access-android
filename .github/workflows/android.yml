name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: terminal-frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: terminal-frontend

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run detekt
        run: ./gradlew detekt

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/terminal-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: terminal-debug-apk
          path: app/build/outputs/apk/debug/terminal-debug.apk

      - name: Update latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Latest debug APK built from `main` branch.

            **Install:** Download `terminal-debug.apk` and sideload via `adb install` or file manager.

            _Updated: ${{ github.event.head_commit.timestamp }}_
            _Commit: ${{ github.sha }}_
          prerelease: true
          files: app/build/outputs/apk/debug/terminal-debug.apk
          make_latest: true
